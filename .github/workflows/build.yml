name: Build Holochain for Android (aarch64)

on:
  workflow_dispatch:
    inputs:
      holochain_ref:
        description: 'Holochain git ref (tag, branch, or commit)'
        required: true
        default: 'holochain-0.6.1-rc.1'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h /

      - name: Checkout holochain
        uses: actions/checkout@v4
        with:
          repository: holochain/holochain
          ref: ${{ github.event.inputs.holochain_ref }}

      - name: Install cross (using stable, independent of holochain's pinned toolchain)
        run: |
          rustup toolchain install stable
          cargo +stable install cross --git https://github.com/cross-rs/cross

      - name: Install holochain's pinned Rust toolchain + Android target
        run: |
          if [ -f rust-toolchain.toml ]; then
            TOOLCHAIN=$(grep 'channel' rust-toolchain.toml | head -1 | sed 's/.*=\s*"\(.*\)".*/\1/')
          elif [ -f rust-toolchain ]; then
            TOOLCHAIN=$(cat rust-toolchain | tr -d '[:space:]')
          else
            TOOLCHAIN=stable
          fi
          echo "Holochain toolchain: $TOOLCHAIN"
          rustup toolchain install "$TOOLCHAIN" --target aarch64-linux-android --component rust-src
          rustup default "$TOOLCHAIN"

      - name: Create Cross.toml
        run: |
          cat > Cross.toml << 'EOF'
          [target.aarch64-linux-android]
          pre-build = [
            "apt-get update -y && apt-get install -y --no-install-recommends protobuf-compiler autoconf libtool make",
            "curl -LO https://download.libsodium.org/libsodium/releases/libsodium-1.0.20.tar.gz && tar xzf libsodium-1.0.20.tar.gz && cd libsodium-1.0.20 && ./configure --host=aarch64-linux-android --prefix=/usr/local/aarch64-linux-android --disable-shared CC=${CC_aarch64_linux_android} AR=${AR_aarch64_linux_android} RANLIB=${RANLIB_aarch64_linux_android} CFLAGS='-fPIC' && make -j$(nproc) && make install",
          ]
          EOF

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android-aarch64-cross

      - name: Build holochain
        run: |
          cross build --release \
            --target aarch64-linux-android \
            -p holochain \
            --no-default-features \
            --features "default"
        env:
          SODIUM_LIB_DIR: /usr/local/aarch64-linux-android/lib
          SODIUM_STATIC: 1
          SODIUM_USE_PKG_CONFIG: 0
          CARGO_BUILD_JOBS: 4

      - name: Build lair-keystore
        run: |
          cross build --release \
            --target aarch64-linux-android \
            -p lair_keystore
        env:
          SODIUM_LIB_DIR: /usr/local/aarch64-linux-android/lib
          SODIUM_STATIC: 1
          SODIUM_USE_PKG_CONFIG: 0
          CARGO_BUILD_JOBS: 4

      - name: Build hc CLI
        run: |
          cross build --release \
            --target aarch64-linux-android \
            -p hc
        continue-on-error: true

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          TARGET_DIR="target/aarch64-linux-android/release"
          for bin in holochain lair-keystore hc; do
            if [ -f "${TARGET_DIR}/${bin}" ]; then
              cp "${TARGET_DIR}/${bin}" artifacts/
              ls -lh "artifacts/${bin}"
              file "artifacts/${bin}"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holochain-android-aarch64
          path: artifacts/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.holochain_ref }}
          name: "holochain ${{ github.event.inputs.holochain_ref }} · aarch64-linux-android"
          body: |
            Native Android binaries for **${{ github.event.inputs.holochain_ref }}**.

            Built with [cross](https://github.com/cross-rs/cross) targeting `aarch64-linux-android` (Android NDK r25b, API 28).
            Uses Android's native linker (`/system/bin/linker64`) — runs directly in Termux without proot.

            ## Install
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/daniel-thisnow/moss-android-edge-node/main/install.sh)
            ```

            ## Manual download
            Download `holochain` and `lair-keystore` from the assets below and place them in `~/holochain-native/bin/`.
          files: artifacts/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
