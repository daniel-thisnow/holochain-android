name: Build Holochain for Android (aarch64)

on:
  workflow_dispatch:
    inputs:
      holochain_ref:
        description: 'Holochain git ref (tag, branch, or commit)'
        required: true
        default: 'holochain-0.6.1-rc.1'

env:
  CARGO_TERM_COLOR: always
  NDK_VERSION: '27.2.12479018'
  API_LEVEL: '24'
  LIBSODIUM_VERSION: '1.0.20'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc
          df -h /

      - name: Checkout holochain
        uses: actions/checkout@v4
        with:
          repository: holochain/holochain
          ref: ${{ github.event.inputs.holochain_ref }}

      - name: Install Rust toolchain + Android target
        run: |
          if [ -f rust-toolchain.toml ]; then
            TOOLCHAIN=$(grep 'channel' rust-toolchain.toml | head -1 | sed 's/.*=\s*"\(.*\)".*/\1/')
            echo "Detected toolchain: $TOOLCHAIN"
          elif [ -f rust-toolchain ]; then
            TOOLCHAIN=$(cat rust-toolchain | tr -d '[:space:]')
          else
            TOOLCHAIN=stable
          fi
          rustup toolchain install "$TOOLCHAIN" --target aarch64-linux-android --component rust-src
          rustup default "$TOOLCHAIN"
          rustup target add aarch64-linux-android
          rustc --version && cargo --version

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: android-aarch64

      - name: Install Android NDK
        run: |
          sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            --install "ndk;${NDK_VERSION}"
          NDK_HOME="${ANDROID_HOME}/ndk/${NDK_VERSION}"
          echo "NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=${NDK_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${NDK_HOME}" >> $GITHUB_ENV
          echo "ANDROID_NDK=${NDK_HOME}" >> $GITHUB_ENV

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler perl make ninja-build cmake autoconf libtool

      - name: Cross-compile libsodium for Android aarch64
        run: |
          NDK_TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          CC="${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang"
          AR="${NDK_TOOLCHAIN}/bin/llvm-ar"
          RANLIB="${NDK_TOOLCHAIN}/bin/llvm-ranlib"
          PREFIX="${GITHUB_WORKSPACE}/libsodium-android"

          curl -LO "https://download.libsodium.org/libsodium/releases/libsodium-${LIBSODIUM_VERSION}.tar.gz"
          tar xzf "libsodium-${LIBSODIUM_VERSION}.tar.gz"
          cd "libsodium-${LIBSODIUM_VERSION}"

          ./configure \
            --host=aarch64-linux-android \
            --prefix="$PREFIX" \
            --disable-shared \
            --enable-static \
            CC="$CC" AR="$AR" RANLIB="$RANLIB" \
            CFLAGS="-fPIC -O2"

          make -j$(nproc)
          make install

          echo "SODIUM_LIB_DIR=${PREFIX}/lib" >> $GITHUB_ENV
          echo "SODIUM_STATIC=1" >> $GITHUB_ENV
          echo "SODIUM_USE_PKG_CONFIG=0" >> $GITHUB_ENV
          echo "Built libsodium at ${PREFIX}/lib:"
          ls -lh "${PREFIX}/lib/"

      - name: Configure cross-compilation
        run: |
          NDK_TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"

          mkdir -p .cargo
          cat >> .cargo/config.toml << TOML
          [target.aarch64-linux-android]
          linker = "${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang"
          ar = "${NDK_TOOLCHAIN}/bin/llvm-ar"
          TOML

          echo "CC_aarch64_linux_android=${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV
          echo "CXX_aarch64_linux_android=${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang++" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${NDK_TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB_aarch64_linux_android=${NDK_TOOLCHAIN}/bin/llvm-ranlib" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_TOOLCHAIN}/bin/aarch64-linux-android${API_LEVEL}-clang" >> $GITHUB_ENV

          echo "CMAKE_TOOLCHAIN_FILE=${NDK_HOME}/build/cmake/android.toolchain.cmake" >> $GITHUB_ENV
          echo "ANDROID_ABI=arm64-v8a" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM=android-${API_LEVEL}" >> $GITHUB_ENV

          echo "OPENSSL_STATIC=1" >> $GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=0" >> $GITHUB_ENV
          echo "SQLITE_SYSTEM=0" >> $GITHUB_ENV

      - name: Build holochain
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            -p holochain \
            --no-default-features \
            --features "default"
        env:
          CARGO_BUILD_JOBS: 4

      - name: Build lair-keystore
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            -p lair_keystore
        env:
          CARGO_BUILD_JOBS: 4

      - name: Build hc CLI
        run: |
          cargo build --release \
            --target aarch64-linux-android \
            -p hc
        continue-on-error: true

      - name: Collect binaries
        run: |
          mkdir -p artifacts
          TARGET_DIR="target/aarch64-linux-android/release"
          for bin in holochain lair-keystore hc; do
            if [ -f "${TARGET_DIR}/${bin}" ]; then
              cp "${TARGET_DIR}/${bin}" artifacts/
              ls -lh "artifacts/${bin}"
              file "artifacts/${bin}"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holochain-android-aarch64
          path: artifacts/
          retention-days: 30
